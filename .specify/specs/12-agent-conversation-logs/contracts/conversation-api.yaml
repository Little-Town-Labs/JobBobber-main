openapi: 3.0.0
info:
  title: Conversation Logs API
  version: 1.0.0
  description: tRPC endpoints for viewing agent conversation logs (read-only)

paths:
  /api/trpc/conversations.listForSeeker:
    post:
      summary: List conversations for authenticated seeker
      description: Returns paginated list of conversations where seeker's agent participated
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                cursor:
                  type: string
                  description: Pagination cursor (conversation ID)
                limit:
                  type: integer
                  minimum: 1
                  maximum: 50
                  default: 20
                status:
                  type: string
                  enum: [IN_PROGRESS, COMPLETED_MATCH, COMPLETED_NO_MATCH, TERMINATED]
      responses:
        '200':
          description: Paginated conversation list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationListResponse'

  /api/trpc/conversations.listForEmployer:
    post:
      summary: List conversations for authenticated employer
      description: Returns paginated conversations filtered by job posting
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [jobPostingId]
              properties:
                jobPostingId:
                  type: string
                cursor:
                  type: string
                limit:
                  type: integer
                  minimum: 1
                  maximum: 50
                  default: 20
                status:
                  type: string
                  enum: [IN_PROGRESS, COMPLETED_MATCH, COMPLETED_NO_MATCH, TERMINATED]
      responses:
        '200':
          description: Paginated conversation list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationListResponse'

  /api/trpc/conversations.getById:
    post:
      summary: Get single conversation with redacted messages
      description: Returns full conversation log with sensitive data redacted
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [conversationId]
              properties:
                conversationId:
                  type: string
      responses:
        '200':
          description: Conversation detail with redacted messages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationDetailResponse'
        '404':
          description: Conversation not found or unauthorized

  /api/trpc/settings.updateDataUsageOptOut:
    post:
      summary: Update data usage opt-out preference
      description: Toggle whether conversation data may be used for model improvement
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [optOut]
              properties:
                optOut:
                  type: boolean
      responses:
        '200':
          description: Updated preference

components:
  schemas:
    ConversationListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ConversationSummary'
        nextCursor:
          type: string
          nullable: true
        hasMore:
          type: boolean

    ConversationSummary:
      type: object
      properties:
        id:
          type: string
        jobPostingTitle:
          type: string
        candidateName:
          type: string
          description: Shown to employer only
        status:
          type: string
          enum: [IN_PROGRESS, COMPLETED_MATCH, COMPLETED_NO_MATCH, TERMINATED]
        messageCount:
          type: integer
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
        outcome:
          type: string
          nullable: true

    ConversationDetailResponse:
      type: object
      properties:
        id:
          type: string
        jobPostingTitle:
          type: string
        candidateName:
          type: string
          description: Candidate name/identifier (shown to employer)
          nullable: true
        status:
          type: string
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
        outcome:
          type: string
          nullable: true
        messages:
          type: array
          items:
            $ref: '#/components/schemas/RedactedMessage'

    RedactedMessage:
      type: object
      properties:
        role:
          type: string
          enum: [employer_agent, seeker_agent]
        content:
          type: string
          description: Message text with sensitive values replaced by [REDACTED]
        phase:
          type: string
          enum: [discovery, screening, deep_evaluation, negotiation, decision]
        timestamp:
          type: string
          format: date-time
        turnNumber:
          type: integer
