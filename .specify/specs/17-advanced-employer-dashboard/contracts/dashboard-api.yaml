# tRPC API Contracts — Feature 17: Advanced Employer Dashboard
#
# All procedures are on the `matches` and `dashboard` routers.
# All require employer authentication (employerProcedure).
# All gated behind ADVANCED_EMPLOYER_DASHBOARD feature flag.

# ============================================================================
# NEW ROUTER: dashboard
# ============================================================================

dashboard.getPipelineSummary:
  type: query
  auth: employerProcedure
  flag: ADVANCED_EMPLOYER_DASHBOARD
  input: {}
  output:
    postings:
      type: array
      items:
        id: string
        title: string
        status: JobPostingStatus
        matchCounts:
          total: number
          pending: number
          accepted: number
          declined: number
        matchRate: number           # matches / total evaluations (0-100)
        conversationMetrics:
          total: number             # total conversations initiated
          inProgress: number        # currently running
          completed: number         # finished evaluations
    totals:
      totalPostings: number
      totalMatches: number
      totalPending: number
      totalAccepted: number

dashboard.getPostingMetrics:
  type: query
  auth: employerProcedure
  flag: ADVANCED_EMPLOYER_DASHBOARD
  input:
    jobPostingId: string
  output:
    totalConversations: number
    inProgressConversations: number
    completedEvaluations: number
    matchRate: number
    matchCounts:
      total: number
      pending: number
      accepted: number
      declined: number

# ============================================================================
# EXTENDED: matches router
# ============================================================================

matches.listForPosting:
  # EXISTING procedure — extended with new filter params
  type: query
  auth: employerProcedure
  input:
    jobPostingId: string
    cursor: string?
    limit: number (1-100, default 20)
    status: "PENDING" | "ACCEPTED" | "DECLINED"?
    sort: "confidence" | "newest"?
    # NEW FILTERS (Feature 17):
    experienceLevel: ("ENTRY" | "MID" | "SENIOR" | "EXECUTIVE")[]?
    locationType: ("REMOTE" | "HYBRID" | "ONSITE")[]?
    confidenceLevel: ("STRONG" | "GOOD" | "POTENTIAL")[]?
  output:
    items: MatchResponse[]
    nextCursor: string | null
    hasMore: boolean

matches.getForComparison:
  type: query
  auth: employerProcedure
  flag: ADVANCED_EMPLOYER_DASHBOARD
  input:
    jobPostingId: string
    matchIds: string[] (min 2, max 4)
  output:
    type: array
    items:
      matchId: string
      confidenceScore: MatchConfidence
      matchSummary: string
      evaluationData: json?
      seekerName: string
      seekerSkills: string[]
      seekerExperienceLevel: string?
      seekerLocation: string?
      employerStatus: MatchPartyStatus
      createdAt: string

matches.bulkUpdateStatus:
  type: mutation
  auth: employerProcedure
  flag: ADVANCED_EMPLOYER_DASHBOARD
  input:
    jobPostingId: string
    matchIds: string[] (min 1, max 100)
    status: "ACCEPTED" | "DECLINED"
  output:
    updated: number       # how many actually changed
    skipped: number       # already non-PENDING (EC-4)
    total: number         # total requested

# ============================================================================
# EXTENDED: team router (existing)
# ============================================================================

team.getActivityLog:
  # EXISTING procedure — may need pagination enhancement
  type: query
  auth: employerProcedure (admin role required)
  flag: ADVANCED_EMPLOYER_DASHBOARD (+ MULTI_MEMBER_EMPLOYER)
  input:
    cursor: string?
    limit: number (1-50, default 20)
    actorClerkUserId: string?   # filter by team member
    action: string?             # filter by action type
  output:
    items:
      type: array
      items:
        id: string
        actorName: string
        action: string
        targetType: string?
        targetLabel: string?
        createdAt: string
    nextCursor: string | null
    hasMore: boolean
