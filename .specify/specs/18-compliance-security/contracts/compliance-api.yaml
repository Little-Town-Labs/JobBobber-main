#   }

# ===========================================================================
# compliance.getMfaStatus
# ===========================================================================
# Procedure: protectedProcedure
# Type: query
# Input: none
# Output:
#   {
#     mfaEnabled: boolean
#     mfaDismissedAt: string | null (ISO 8601)
#     shouldPrompt: boolean
#   }
# Notes:
#   - Checks Clerk user's MFA enrollment via Clerk SDK
#   - shouldPrompt = !mfaEnabled && (dismissedAt is null || dismissedAt > 7 days ago)

# ===========================================================================
# compliance.dismissMfaPrompt
# ===========================================================================
# Procedure: protectedProcedure
# Type: mutation
# Input: none
# Output:
#   { dismissed: true }
# Notes:
#   - Stores dismissal timestamp in user metadata (Clerk publicMetadata)
#   - Re-prompts after 7 days

# ===========================================================================
# Inngest Functions
# ===========================================================================

# compliance/account.deletion.execute
# Trigger: scheduled event (72h after request)
# Steps:
#   1. Verify DeletionRequest still PENDING (not cancelled)
#   2. Update status → EXECUTING
#   3. Terminate active agent conversations (set status TERMINATED)
#   4. Close active job postings (employer only)
#   5. Delete user entity (Prisma cascades handle related records)
#   6. Delete Clerk user/organization
#   7. Update DeletionRequest status → COMPLETED
#   8. Log "account.deletion_completed" to AuditLog (with SYSTEM actor)
# Retry: 3 attempts with exponential backoff
# Failure: Update DeletionRequest status → FAILED, alert admin

# ===========================================================================
# Rate Limiting Middleware
# ===========================================================================

# Applied as tRPC middleware (not per-procedure):
#
# Categories and limits:
#   - auth: 20 req/min (unauthenticated endpoints)
#   - read: 100 req/min (authenticated reads)
#   - write: 30 req/min (authenticated mutations)
#   - agent: 10 req/min (agent-triggering operations)
#   - webhook: 200 req/min (Stripe/Clerk webhooks)
#
# Response headers on all requests:
#   X-RateLimit-Limit: <max requests in window>
#   X-RateLimit-Remaining: <requests remaining>
#   X-RateLimit-Reset: <unix timestamp when window resets>
#
# On limit exceeded:
#   HTTP 429 with Retry-After header
#   tRPC error code: TOO_MANY_REQUESTS
