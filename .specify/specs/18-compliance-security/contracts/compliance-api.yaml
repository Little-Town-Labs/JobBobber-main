# tRPC API Contracts — Feature 18: Compliance & Security
# Namespace: compliance.*

# All procedures gated behind COMPLIANCE_SECURITY feature flag.

# ===========================================================================
# compliance.exportMyData
# ===========================================================================
# Procedure: protectedProcedure (seeker or employer)
# Type: query
# Input: none (identity from ctx)
# Output:
#   {
#     exportData: {
#       exportedAt: string (ISO 8601)
#       userType: "JOB_SEEKER" | "EMPLOYER"
#       profile: object (full profile data)
#       settings: object | null (private settings, decrypted custom prompt)
#       matches: Array<{
#         id: string
#         jobPostingTitle: string
#         confidenceScore: string
#         matchSummary: string
#         seekerStatus: string
#         employerStatus: string
#         createdAt: string
#       }>
#       conversations: Array<{
#         id: string
#         jobPostingTitle: string
#         status: string
#         messages: Array<object> (redacted)
#         startedAt: string
#         completedAt: string | null
#       }>
#       feedbackInsights: object | null
#       dataUsageOptOut: boolean
#     }
#   }
# Audit: logs "data.exported" to AuditLog
# Notes:
#   - API keys (byokApiKeyEncrypted) EXCLUDED from export
#   - Conversation messages redacted using existing redaction.ts
#   - For employers: includes all job postings and their matches/conversations

# ===========================================================================
# compliance.requestDeletion
# ===========================================================================
# Procedure: protectedProcedure (seeker or employer)
# Type: mutation
# Input:
#   {
#     confirmation: string (must equal "DELETE MY ACCOUNT")
#     reason?: string (max 500 chars)
#   }
# Output:
#   {
#     id: string (DeletionRequest ID)
#     status: "PENDING"
#     scheduledAt: string (ISO 8601, requestedAt + 72h)
#   }
# Audit: logs "account.deletion_requested" to AuditLog
# Errors:
#   - CONFLICT: deletion already pending
#   - BAD_REQUEST: confirmation text doesn't match
# Notes:
#   - Schedules Inngest event "compliance/account.deletion.execute"
#   - User can still log in during grace period

# ===========================================================================
# compliance.cancelDeletion
# ===========================================================================
# Procedure: protectedProcedure
# Type: mutation
# Input: none (identity from ctx)
# Output:
#   {
#     id: string
#     status: "CANCELLED"
#   }
# Audit: logs "account.deletion_cancelled" to AuditLog
# Errors:
#   - NOT_FOUND: no pending deletion request
#   - BAD_REQUEST: deletion already executing or completed

